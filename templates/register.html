<!DOCTYPE html>
<html>

<head>

  <meta charset="UTF-8">

  <title>สมัครสมาชิก</title>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>

    body {
      font-family: Arial;
      max-width: 400px;
      margin: auto;
      padding: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 6px 0;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #06c755;
      color: white;
      border: none;
      border-radius: 8px;
    }

  </style>

</head>

<body>

<h2>สมัครสมาชิก</h2>

<input id="name" placeholder="ชื่อ">

<input id="home" placeholder="หมู่บ้าน">

<input id="address" placeholder="ที่อยู่">

<input id="phone" placeholder="เบอร์โทร">

<button onclick="registerUser()">
  สมัครสมาชิก
</button>

<script>

const LIFF_ID = "{{ LIFF_ID }}"

const OFM = "{{ OFM }}"

const BASE_URL =
  "https://gitbackend-416424538655.asia-southeast3.run.app"

// =====================================================
// INIT
// =====================================================

async function init() {

  try {

    console.log("INIT LIFF")

    await liff.init({
      liffId: LIFF_ID
    })

    console.log("LIFF READY")

    if (!liff.isLoggedIn()) {

      liff.login()

      return
    }

  } catch (err) {

    console.error("LIFF INIT ERROR:", err)

    alert("LIFF INIT ERROR")
  }
}

init()

// =====================================================
// REGISTER
// =====================================================

async function registerUser() {

  try {

    console.log("START REGISTER")

    const profile = await liff.getProfile()

    console.log("PROFILE:", profile)

    const data = {

      userId:
        profile.userId,

      ofm:
        OFM,

      name:
        document.getElementById("name").value,

      home:
        document.getElementById("home").value,

      address:
        document.getElementById("address").value,

      phone:
        document.getElementById("phone").value
    }

    console.log("SEND:", data)

    const res = await fetch(
      `${BASE_URL}/register`,
      {
        method: "POST",

        headers: {
          "Content-Type": "application/json"
        },

        body: JSON.stringify(data)
      }
    )

    console.log("STATUS:", res.status)

    const json = await res.json()

    console.log("RESULT:", json)

    if (json.status === "ok") {

      alert("สมัครสำเร็จ")

      liff.closeWindow()

    } else {

      alert(json.message || "สมัครไม่สำเร็จ")
    }

  } catch (err) {

    console.error("REGISTER ERROR:", err)

    alert("เกิดข้อผิดพลาด")
  }
}

</script>

</body>
</html>
