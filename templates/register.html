<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>สมัครสมาชิก</title>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    body {
      font-family: Arial;
      max-width: 400px;
      margin: auto;
      padding: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 6px 0;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #06c755;
      color: white;
      border: none;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<h2>สมัครสมาชิก</h2>

<input id="name" placeholder="ชื่อ">
<input id="home" placeholder="หมู่บ้าน">
<input id="address" placeholder="ที่อยู่">
<input id="phone" placeholder="เบอร์โทร">

<button onclick="registerUser()">
  สมัครสมาชิก
</button>

<script>

const LIFF_ID = "{{ LIFF_ID }}"
const OFM = "{{ OFM }}"

const API_URL = "https://gitbackend-416424538655.asia-southeast3.run.app/register"

async function init() {

  await liff.init({
    liffId: LIFF_ID
  })

  if (!liff.isLoggedIn()) {
    liff.login()
    return
  }
}

init()

async function registerUser() {

  try {

    const profile = await liff.getProfile()

    const data = {

      userId: profile.userId,

      ofm: OFM,

      name: document.getElementById("name").value,

      home: document.getElementById("home").value,

      address: document.getElementById("address").value,

      phone: document.getElementById("phone").value
    }

    const res = await fetch(API_URL, {

      method: "POST",

      headers: {
        "Content-Type": "application/json"
      },

      body: JSON.stringify(data)
    })

    const json = await res.json()

    if (json.status === "ok") {

      alert("สมัครสำเร็จ")

      liff.closeWindow()

    } else {

      alert("สมัครไม่สำเร็จ")
    }

  } catch (err) {

    console.error(err)

    alert("เกิดข้อผิดพลาด")
  }
}

</script>

</body>
</html>
