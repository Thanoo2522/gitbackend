<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>สมัครสมาชิก</title>
  <script src="https://line-scdn.net"></script>
  <style>
    body { font-family: Arial, sans-serif; max-width: 400px; margin: auto; padding: 20px; }
    h2 { text-align: center; font-size: 20px; color: #333; }
    input { width: 100%; padding: 12px; margin: 6px 0; font-size: 14px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
    button { width: 100%; padding: 12px; font-size: 16px; background: #06c755; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    button:hover { background: #05b14b; }
  </style>
</head>
<body>

<h2>สมัครสมาชิก</h2>

<input id="name" placeholder="ชื่อติดต่อ">
<input id="home" placeholder="ชื่อหมู่บ้าน">
<input id="address" placeholder="ที่อยู่">
<input id="phone" placeholder="เบอร์โทร" type="tel">

<button onclick="register()">สมัคร</button>

<script>
let API_URL = ""
// รับค่า LIFF_ID แบบ Dynamic มาจากตัวแปรสภาวะแวดล้อมที่ส่งมาจาก Flask Backend
const LIFF_ID = "{{ liff_id }}" 
let OFM = ""
// ตรวจจับ URL หลักของ Domain ปัจจุบันแบบอัตโนมัติ
const BASE_URL = window.location.origin 

// ฟังก์ชันดึง Query Parameters
function extractQueryParam(name, url = window.location.href) {
  name = name.replace(/[\[\]]/g, '\\$&');
  const regex = new RegExp('[?&]' + name + '(=([^&#]*)|&|#|$)');
  const results = regex.exec(url);
  if (!results) return null;
  if (!results[2]) return '';
  return decodeURIComponent(results[2].replace(/\+/g, ' '));
}

// ================= INITIALIZE SYSTEM =================
async function initApp() {
  try {
    // 1. เริ่มต้นระบบ LIFF SDK
    await liff.init({ liffId: LIFF_ID })

    if (!liff.isLoggedIn()) {
      liff.login()
      return
    }

    // 2. แกะค่ารหัสร้านค้า (ofm) จาก URL Parameter
    OFM = extractQueryParam("ofm")
    if (!OFM) {
      const state = extractQueryParam("state")
      if (state) {
        OFM = extractQueryParam("ofm", "?" + decodeURIComponent(state))
      }
    }

    if (!OFM) {
      alert("❌ ไม่พบข้อมูลรหัสร้านค้า (ofm) กรุณาปิดหน้าเว็บและเข้าสู่ระบบผ่านลิงก์ปุ่มกดในไลน์อีกครั้งค่ะ")
      return
    }

    console.log("🎯 Linked with Shop:", OFM)

    // 3. ดึง Config API สำหรับส่งข้อมูลสมัครสมาชิก
    const res = await fetch(`${BASE_URL}/config/${encodeURIComponent(OFM)}`)
    const config = await res.json()

    if (config.status === "ok") {
      API_URL = config.apiUrl.trim()
      console.log("✅ ระบบหน้าบ้านพร้อมสมัครแล้ว")
    } else {
      alert("❌ ไม่พบข้อมูลร้านนี้ในฐานข้อมูล")
    }

  } catch (err) {
    console.error("💥 INIT ERROR:", err)
    alert("ระบบเกิดข้อผิดพลาดในการดึงข้อมูลเริ่มต้น")
  }
}

// รันฟังก์ชันเริ่มต้นระบบทันทีที่โหลดหน้าเว็บสำเร็จ
initApp();

// ================= SUBMIT REGISTER DATA =================
async function register() {
  try {
    // ดึง Profile จากผู้ใช้งาน LINE ในขณะนั้น
    const profile = await liff.getProfile()

    const name = document.getElementById("name").value.trim()
    const home = document.getElementById("home").value.trim()
    const address = document.getElementById("address").value.trim()
    const phone = document.getElementById("phone").value.trim()

    if (!name || !home || !address || !phone) {
      alert("กรุณากรอกข้อมูลให้ครบถ้วนทุกช่อง")
      return
    }

    const payload = {
      ofm: OFM,
      userId: profile.userId,
      name: name,
      home: home,
      address: address,
      phone: phone
    }

    console.log("⚡ กำลังส่งข้อมูลยืนยัน:", payload)

    // ส่งชุดข้อมูลวัตถุไปยัง API ปลายทางที่กำหนดไว้
    const res = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    })

    const json = await res.json()

    if (json.status === "ok") {
      alert("สมัครสมาชิกสำเร็จเรียบร้อยแล้วค่ะ ✅")
      // ปิดหน้าจอเว็บบนแอป LINE ทันที
      liff.closeWindow()
    } else {
      alert("สมัครไม่สำเร็จ: " + (json.message || "เซิร์ฟเวอร์ปฏิเสธการบันทึกข้อมูล"))
    }

  } catch (err) {
    console.error("💥 REGISTER ERROR:", err)
    alert("การยืนยันระบบสมัครสมาชิกล้มเหลว")
  }
}
</script>

</body>
</html>
