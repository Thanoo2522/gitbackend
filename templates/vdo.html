<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LIFF Camera Stream</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
body{
    margin:0;
    background:black;
    color:white;
    font-family:Arial;
    text-align:center;
}

header{
    padding:10px;
    font-size:18px;
}

video{
    width:100%;
    height:auto;
    background:black;
}

button{
    width:90%;
    padding:12px;
    margin:8px;
    font-size:16px;
    border:none;
    border-radius:10px;
}

#startBtn{background:#00c853;color:white;}
#snapBtn{background:#2979ff;color:white;}
#stopBtn{background:#ff1744;color:white;}

canvas{
    display:none;
}

img{
    width:90%;
    margin-top:10px;
    border-radius:10px;
}
</style>
</head>

<body>

<header>
📷 LIFF Real-time Camera Stream
</header>

<video id="video" autoplay playsinline></video>

<button id="startBtn">Start Camera</button>
<button id="snapBtn">Capture Frame</button>
<button id="stopBtn">Stop Camera</button>

<canvas id="canvas"></canvas>
<img id="snapshot"/>

<script>

let stream = null;
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const snapshot = document.getElementById("snapshot");

async function initLiff(){
    try{
        await liff.init({ liffId: "YOUR_LIFF_ID" });

        // optional: auto login
        if(!liff.isLoggedIn()){
            liff.login();
        }
    }catch(err){
        console.log("LIFF init error:", err);
    }
}

// เปิดกล้องสด--
async function startCamera(){
    try{
        stream = await navigator.mediaDevices.getUserMedia({
            video: {
                facingMode: "environment" // กล้องหลังมือถือ
            },
            audio: false
        });

        video.srcObject = stream;

    }catch(err){
        alert("Cannot access camera: " + err);
        console.log(err);
    }
}

// ถ่ายภาพจาก stream
function captureFrame(){
    const ctx = canvas.getContext("2d");

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

    const dataURL = canvas.toDataURL("image/png");
    snapshot.src = dataURL;
}

// หยุดกล้อง
function stopCamera(){
    if(stream){
        stream.getTracks().forEach(track => track.stop());
        video.srcObject = null;
    }
}

// Events
document.getElementById("startBtn").onclick = startCamera;
document.getElementById("snapBtn").onclick = captureFrame;
document.getElementById("stopBtn").onclick = stopCamera;

initLiff();

</script>

</body>
</html>
