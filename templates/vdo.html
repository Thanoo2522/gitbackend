<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LIFF + Teachable Machine Realtime</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest"></script>

<style>
body{margin:0;background:black;color:white;font-family:Arial;text-align:center;}
video{width:100%;}
button{width:90%;padding:12px;margin:6px;border-radius:10px;}
#startBtn{background:#00c853;}
#stopBtn{background:#ff1744;}
</style>
</head>

<body>

<header>📷 Real-time AI</header>

<video id="video" autoplay playsinline></video>

<button id="startBtn">Start</button>
<button id="stopBtn">Stop</button>

<div id="label-container">Loading...</div>

<script>

let stream, video = document.getElementById("video");
let model, running=false, intervalId;
let userId = null;

// =====================
// LIFF INIT (FIX USER ID)
// =====================
async function initLiff(){
    await liff.init({ liffId: "2010144029-njNgt99E" });

    if(!liff.isLoggedIn()){
        liff.login();
        return;
    }

    const profile = await liff.getProfile();
    userId = profile.userId;
}

initLiff();

// =====================
// LOAD MODEL
// =====================
async function loadModel(){
    model = await tmImage.load("models_v1/model.json","models_v1/metadata.json");
    document.getElementById("label-container").innerHTML = "Model Ready";
}

// =====================
// CAMERA
// =====================
async function startCamera(){
    stream = await navigator.mediaDevices.getUserMedia({
        video:{facingMode:"environment"},
        audio:false
    });
    video.srcObject = stream;
}

// =====================
// PREDICT
// =====================
async function predict(){
    const prediction = await model.predict(video);

    prediction.sort((a,b)=>b.probability-a.probability);

    let txt="";
    prediction.forEach(p=>{
        txt += `${p.className}: ${(p.probability*100).toFixed(1)}%<br>`;
    });

    document.getElementById("label-container").innerHTML = txt;
}

// =====================
// START
// =====================
async function start(){
    if(running) return;
    running = true;

    await loadModel();
    await startCamera();

    intervalId = setInterval(predict, 500);
}

// =====================
// STOP + CLEAR HUB STATE
// =====================
async function stop(){

    running = false;

    clearInterval(intervalId);

    if(stream){
        stream.getTracks().forEach(t=>t.stop());
    }

    video.srcObject = null;

    // 🔥 notify HUB close
    if(userId){
        navigator.sendBeacon(
            "/close-vdo",
            JSON.stringify({user_id:userId})
        );
    }
}

// =====================
document.getElementById("startBtn").onclick = start;
document.getElementById("stopBtn").onclick = stop;

</script>

</body>
</html>
