<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Realtime AI</title>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>

body{

    margin:0;
    padding:20px;

    font-family:Arial;

    text-align:center;

    background:white;

    color:black;
}

h2{

    margin-bottom:20px;
}

video{

    width:95%;
    max-width:500px;

    background:black;

    border-radius:20px;

    object-fit:cover;
}

button{

    margin-top:20px;

    padding:15px 30px;

    font-size:20px;

    border:none;

    border-radius:15px;

    background:#06c755;

    color:white;

    cursor:pointer;
}

#result{

    margin-top:20px;

    font-size:40px;

    font-weight:bold;
}

#debug{

    margin-top:20px;

    font-size:16px;

    color:gray;

    word-break:break-all;
}

</style>

</head>

<body>

<h2>Realtime AI</h2>

<!-- ========================================= -->
<!-- VIDEO -->
<!-- ========================================= -->

<video

    id="video"

    autoplay

    muted

    playsinline

    webkit-playsinline

    controls>

</video>

<!-- ========================================= -->
<!-- PLAY BUTTON -->
<!-- ========================================= -->

<button onclick="video.play()">

    PLAY VIDEO

</button>

<!-- ========================================= -->
<!-- START BUTTON -->
<!-- ========================================= -->

<button onclick="init()">

    START AI

</button>

<!-- ========================================= -->
<!-- CANVAS -->
<!-- ========================================= -->

<canvas

    id="canvas"

    width="224"

    height="224"

    style="display:none;">

</canvas>

<!-- ========================================= -->
<!-- RESULT -->
<!-- ========================================= -->

<div id="result">

    loading...

</div>

<!-- ========================================= -->
<!-- DEBUG -->
<!-- ========================================= -->

<div id="debug">

    debug...

</div>

<script>

// =====================================================
// CONFIG
// =====================================================

const LIFF_ID =

    "2010144029-njNgt99E"

const API_URL =

    "https://gitbackend-416424538655.asia-southeast3.run.app"

// =====================================================
// PARAMS
// =====================================================

const params =

    new URLSearchParams(
        window.location.search
    )

const project =

    params.get("project")

console.log(
    "PROJECT =",
    project
)

// =====================================================
// ELEMENTS
// =====================================================

const video =

    document.getElementById("video")

const canvas =

    document.getElementById("canvas")

const ctx =

    canvas.getContext("2d")

const resultDiv =

    document.getElementById("result")

const debugDiv =

    document.getElementById("debug")

let sending = false

// =====================================================
// CAMERA
// =====================================================

async function startCamera(){

    try{

        debugDiv.innerHTML =
            "requesting camera..."

        // =====================================
        // GET CAMERA
        // =====================================

        const stream =

            await navigator
            .mediaDevices
            .getUserMedia({

                video:{
                    facingMode:"user"
                },

                audio:false
            })

        console.log(
            "STREAM =",
            stream
        )

        debugDiv.innerHTML =
            "camera granted"

        // =====================================
        // VIDEO SETTINGS
        // =====================================

        video.srcObject = stream

        video.muted = true

        video.autoplay = true

        video.playsInline = true

        video.setAttribute(
            "playsinline",
            true
        )

        video.setAttribute(
            "webkit-playsinline",
            true
        )

        // =====================================
        // WAIT METADATA
        // =====================================

        await new Promise(

            resolve=>{

                video.onloadedmetadata =
                    ()=>{

                        resolve()
                    }
            }
        )

        debugDiv.innerHTML =
            "metadata loaded"

        // =====================================
        // FORCE PLAY
        // =====================================

        const playPromise =
            video.play()

        if(playPromise !== undefined){

            playPromise

            .then(()=>{

                console.log(
                    "VIDEO PLAYING"
                )

                debugDiv.innerHTML =

                    "camera success"
                    +
                    "<br><br>"
                    +
                    "VIDEO SIZE = "
                    +
                    video.videoWidth
                    +
                    " x "
                    +
                    video.videoHeight

            })

            .catch(err=>{

                console.log(
                    "PLAY ERROR",
                    err
                )

                debugDiv.innerHTML =

                    "PLAY ERROR"
                    +
                    "<br><br>"
                    +
                    err
            })
        }

    }catch(e){

        console.log(
            "CAMERA ERROR",
            e
        )

        debugDiv.innerHTML =

            "CAMERA ERROR"
            +
            "<br><br>"
            +
            e

        resultDiv.innerHTML =
            "camera denied"
    }
}

// =====================================================
// SEND FRAME
// =====================================================

async function sendFrame(){

    // =========================================
    // PREVENT SPAM
    // =========================================

    if(sending){
        return
    }

    // =========================================
    // VIDEO READY
    // =========================================

    if(video.readyState < 2){
        return
    }

    sending = true

    try{

        // =====================================
        // DRAW IMAGE
        // =====================================

        ctx.drawImage(

            video,

            0,

            0,

            224,

            224
        )

        // =====================================
        // TO BLOB
        // =====================================

        const blob =

            await new Promise(

                resolve =>

                    canvas.toBlob(

                        resolve,

                        "image/jpeg",

                        0.7
                    )
            )

        // =====================================
        // FORM DATA
        // =====================================

        const formData =

            new FormData()

        formData.append(

            "image",

            blob,

            "frame.jpg"
        )

        formData.append(

            "project",

            project
        )

        // =====================================
        // FETCH
        // =====================================

        const r = await fetch(

            API_URL + "/predict",

            {

                method:"POST",

                body:formData
            }
        )

        const data =

            await r.json()

        console.log(data)

        // =====================================
        // RESULT
        // =====================================

        if(data.status === "success"){

            resultDiv.innerHTML =

                data.label
                +
                "<br>"
                +
                Math.round(
                    data.confidence * 100
                )
                +
                "%"

        }else{

            resultDiv.innerHTML =

                data.message
        }

    }catch(e){

        console.log(e)

        debugDiv.innerHTML =

            "SEND ERROR"
            +
            "<br><br>"
            +
            e

    }finally{

        sending = false
    }
}

// =====================================================
// INIT
// =====================================================

async function init(){

    try{

        debugDiv.innerHTML =
            "LIFF INIT..."

        // =====================================
        // LIFF
        // =====================================

        await liff.init({

            liffId:LIFF_ID
        })

        // =====================================
        // OPEN EXTERNAL BROWSER
        // =====================================

        if(liff.isInClient()){

            debugDiv.innerHTML =
                "opening external browser..."

            liff.openWindow({

                url:window.location.href,

                external:true
            })

            return
        }

        debugDiv.innerHTML =
            "external browser ready"

        // =====================================
        // CAMERA
        // =====================================

        await startCamera()

        resultDiv.innerHTML =
            "AI READY"

        // =====================================
        // LOOP
        // =====================================

        setInterval(

            sendFrame,

            1000
        )

    }catch(e){

        console.log(e)

        debugDiv.innerHTML =

            "INIT ERROR"
            +
            "<br><br>"
            +
            e

        resultDiv.innerHTML =
            "init error"
    }
}

</script>

</body>
</html>
