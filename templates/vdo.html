<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Realtime AI</title>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>

body{
    font-family: Arial;
    text-align:center;
    background:#111;
    color:white;
}

video{
    width:95%;
    max-width:500px;
    border-radius:20px;
    background:black;
}

#result{
    margin-top:20px;
    font-size:40px;
    font-weight:bold;
}

</style>

</head>

<body>

<h2>Realtime AI</h2>

<video
    id="video"
    autoplay
    playsinline
    muted>
</video>

<canvas
    id="canvas"
    width="224"
    height="224"
    style="display:none;">
</canvas>

<div id="result">
    loading...
</div>

<script>

// =====================================================
// CONFIG
// =====================================================

const API_URL =
"https://gitbackend-416424538655.asia-southeast3.run.app"

// =====================================================
// PARAMS
// =====================================================

const params =

    new URLSearchParams(
        window.location.search
    )

const project =
    params.get("project")

console.log(
    "PROJECT =",
    project
)

// =====================================================
// ELEMENTS
// =====================================================

const video =
    document.getElementById("video")

const canvas =
    document.getElementById("canvas")

const ctx =
    canvas.getContext("2d")

const resultDiv =
    document.getElementById("result")

// =====================================================
// CAMERA
// =====================================================

async function startCamera(){

    try{

        const stream =

            await navigator
            .mediaDevices
            .getUserMedia({

                video:{
                    facingMode:"environment"
                },

                audio:false
            })

        video.srcObject = stream

        // wait video ready

        await new Promise(

            (resolve)=>{

                video.onloadedmetadata =
                    ()=>{

                        resolve()
                    }
            }
        )

        await video.play()

        console.log("CAMERA READY")

    }catch(e){

        console.log(
            "CAMERA ERROR",
            e
        )

        resultDiv.innerHTML =
            "camera error"
    }
}

// =====================================================
// SEND FRAME
// =====================================================

let sending = false

async function sendFrame(){

    // prevent spam

    if(sending){
        return
    }

    // wait video ready

    if(video.readyState < 2){
        return
    }

    sending = true

    try{

        ctx.drawImage(

            video,
            0,
            0,
            224,
            224
        )

        const blob = await new Promise(

            resolve =>

                canvas.toBlob(

                    resolve,

                    "image/jpeg",

                    0.7
                )
        )

        const formData =
            new FormData()

        formData.append(
            "image",
            blob,
            "frame.jpg"
        )

        formData.append(
            "project",
            project
        )

        const r = await fetch(

            API_URL + "/predict",

            {
                method:"POST",
                body:formData
            }
        )

        const data =
            await r.json()

        console.log(data)

        if(data.status === "success"){

            resultDiv.innerHTML =

                data.label
                +
                "<br>"
                +
                Math.round(
                    data.confidence * 100
                )
                +
                "%"

        }else{

            resultDiv.innerHTML =
                data.message
        }

    }catch(e){

        console.log(
            "SEND ERROR",
            e
        )

    }finally{

        sending = false
    }
}

// =====================================================
// START
// =====================================================

async function init(){

    try{

        await liff.init({

            liffId:"2010144029-njNgt99E"
        })

        console.log("LIFF READY")

        await startCamera()

        resultDiv.innerHTML =
            "AI READY"

        // 1 FPS ก่อน
        // ลดโหลด Cloud Run

        setInterval(

            sendFrame,

            1000
        )

    }catch(e){

        console.log(
            "INIT ERROR",
            e
        )

        resultDiv.innerHTML =
            "init error"
    }
}

init()

</script>

</body>
</html>
