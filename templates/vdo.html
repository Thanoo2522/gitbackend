<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Realtime AI VDO</title>

<meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1"
/>

<!-- TensorFlow.js -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>

<!-- Teachable Machine -->
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest"></script>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:black;
    color:white;
    font-family:Arial, sans-serif;
    text-align:center;
}

/* =========================
HEADER
========================= */

header{
    padding:14px;
    font-size:20px;
    font-weight:bold;
    background:#111;
}

/* =========================
VIDEO
========================= */

#videoContainer{
    position:relative;
    width:100%;
    height:calc(100vh - 260px);
    background:black;
    overflow:hidden;
}

video{
    width:100%;
    height:100%;
    object-fit:cover;
    background:black;
}

/* =========================
CONTROLS
========================= */

.controls{
    padding:10px;
}

button{
    width:90%;
    max-width:500px;

    padding:14px;
    margin:8px;

    font-size:18px;
    font-weight:bold;

    border:none;
    border-radius:12px;

    cursor:pointer;
}

#startBtn{
    background:#00c853;
    color:white;
}

#stopBtn{
    background:#ff1744;
    color:white;
}

/* =========================
RESULT
========================= */

#result{
    padding:10px;
    margin-bottom:20px;
}

.classBox{

    margin:8px auto;
    padding:12px;

    width:90%;
    max-width:500px;

    background:#222;

    border-radius:12px;

    font-size:20px;
    font-weight:bold;
}

.status{
    color:#00e676;
    font-size:18px;
}

.error{
    color:#ff5252;
    font-size:18px;
}

canvas{
    display:none;
}

</style>
</head>

<body>

<header>
📷 Realtime AI Camera
</header>

<div id="videoContainer">

    <video
        id="video"
        autoplay
        playsinline
        muted
    ></video>

</div>

<div class="controls">

    <button id="startBtn">
        Start Realtime AI
    </button>

    <button id="stopBtn">
        Stop
    </button>

</div>

<div id="result">
    Waiting...
</div>

<canvas id="canvas"></canvas>

<script>

// =====================================================
// GLOBAL
// =====================================================

let stream = null;

let model = null;

let running = false;

let predictLoop = null;

const video =
    document.getElementById("video");

const resultDiv =
    document.getElementById("result");

// =====================================================
// FIREBASE MODEL URL
// =====================================================

const MODEL_URL =
"https://firebasestorage.googleapis.com/v0/b/baselineoa.firebasestorage.app/o/models_imagenumber%2Fmodel.json?alt=media";

const METADATA_URL =
"https://firebasestorage.googleapis.com/v0/b/baselineoa.firebasestorage.app/o/models_imagenumber%2Fmetadata.json?alt=media";

// =====================================================
// LOAD MODEL
// =====================================================

async function loadModel(){

    try{

        resultDiv.innerHTML =
            `<div class="status">
                Loading AI Model...
            </div>`;

        console.log(
            "Loading model..."
        );

        console.log(
            "MODEL URL:",
            MODEL_URL
        );

        console.log(
            "METADATA URL:",
            METADATA_URL
        );

        model = await tmImage.load(

            MODEL_URL,
            METADATA_URL
        );

        console.log(
            "MODEL READY"
        );

        resultDiv.innerHTML =
            `<div class="status">
                AI Model Loaded ✅
            </div>`;

    }catch(err){

        console.log(
            "LOAD MODEL ERROR:",
            err
        );

        resultDiv.innerHTML =
            `<div class="error">
                โหลด AI Model ไม่สำเร็จ
            </div>`;
    }
}

// =====================================================
// START CAMERA
// =====================================================

async function startCamera(){

    try{

        // กันเปิดซ้ำ
        if(stream){
            return;
        }

        stream =
            await navigator.mediaDevices
            .getUserMedia({

                video:{
                    facingMode:{
                        ideal:"environment"
                    },

                    width:{
                        ideal:1280
                    },

                    height:{
                        ideal:720
                    }
                },

                audio:false
            });

        video.srcObject = stream;

        await video.play();

        console.log(
            "CAMERA READY"
        );

    }catch(err){

        console.log(
            "CAMERA ERROR:",
            err
        );

        alert(
            "ไม่สามารถเปิดกล้องได้"
        );
    }
}

// =====================================================
// PREDICT FRAME
// =====================================================

async function predictFrame(){

    try{

        if(!running){
            return;
        }

        if(!model){
            return;
        }

        if(video.readyState < 2){
            return;
        }

        const predictions =
            await model.predict(video);

        // sort probability มาก -> น้อย
        predictions.sort(

            (a,b)=>
                b.probability - a.probability
        );

        let html = "";

        predictions.forEach(p => {

            const percent =
                (p.probability * 100)
                .toFixed(1);

            html += `

                <div class="classBox">

                    ${p.className}

                    :

                    ${percent}%

                </div>

            `;
        });

        resultDiv.innerHTML = html;

    }catch(err){

        console.log(
            "PREDICT ERROR:",
            err
        );
    }
}

// =====================================================
// START REALTIME AI
// =====================================================

async function startRealtimeAI(){

    try{

        if(running){
            return;
        }

        running = true;

        resultDiv.innerHTML =
            `<div class="status">
                Starting...
            </div>`;

        // load model
        if(!model){

            await loadModel();
        }

        // start camera
        await startCamera();

        // predict every 500ms = 2 FPS
        predictLoop = setInterval(

            async()=>{

                await predictFrame();

            },

            500
        );

        console.log(
            "Realtime AI STARTED"
        );

    }catch(err){

        console.log(
            "START ERROR:",
            err
        );

        running = false;
    }
}

// =====================================================
// STOP
// =====================================================

function stopRealtimeAI(){

    running = false;

    // stop loop
    if(predictLoop){

        clearInterval(
            predictLoop
        );

        predictLoop = null;
    }

    // stop camera
    if(stream){

        stream
        .getTracks()
        .forEach(track=>{

            track.stop();
        });

        stream = null;
    }

    video.srcObject = null;

    resultDiv.innerHTML =
        `<div class="error">
            Realtime AI Stopped
        </div>`;

    console.log(
        "Realtime AI STOPPED"
    );
}

// =====================================================
// BUTTON EVENTS
// =====================================================

document
.getElementById("startBtn")
.addEventListener(

    "click",

    startRealtimeAI
);

document
.getElementById("stopBtn")
.addEventListener(

    "click",

    stopRealtimeAI
);

// =====================================================
// AUTO START
// =====================================================

window.addEventListener(

    "load",

    async()=>{

        await startRealtimeAI();
    }
);

</script>

</body>
</html>
