<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<title>LIFF AI Camera</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>

html,body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    background:black;
    overflow:hidden;
    font-family:Arial;
}

/* VIDEO FULLSCREEN */
#video{
    position:fixed;
    top:0;
    left:0;
    width:100vw;
    height:100vh;
    object-fit:cover;
}

/* RESULT */
#result{
    position:fixed;
    top:20px;
    left:20px;
    color:white;
    font-size:20px;
    text-shadow:0 0 5px black;
    z-index:10;
}

/* DEBUG */
#debug{
    position:fixed;
    top:60px;
    left:20px;
    color:yellow;
    font-size:14px;
    z-index:10;
}

/* BUTTONS */
#ui{
    position:fixed;
    bottom:30px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:10px;
    z-index:20;
}

button{
    padding:15px 25px;
    font-size:18px;
    border:none;
    border-radius:12px;
    background:#06c755;
    color:white;
}

</style>
</head>

<body>

<!-- ================= VIDEO ================= -->
<video id="video" autoplay playsinline muted></video>

<!-- ================= UI ================= -->
<div id="result">READY</div>
<div id="debug">waiting...</div>

<div id="ui">
    <button onclick="startCamera()">START</button>
    <button onclick="capture()">CAPTURE</button>
    <button onclick="stopCamera()">STOP</button>
</div>

<!-- ================= CANVAS ================= -->
<canvas id="canvas" width="224" height="224" style="display:none;"></canvas>

<script>

// ================= CONFIG =================
const LIFF_ID = "2010144029-njNgt99E";
const API_URL = "https://gitbackend-416424538655.asia-southeast3.run.app";

// ================= ELEMENTS =================
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const result = document.getElementById("result");
const debug = document.getElementById("debug");

let stream = null;
let sending = false;

// ================= LIFF INIT =================
async function initLiff(){
    try{
        await liff.init({ liffId: LIFF_ID });

        debug.innerText = "LIFF READY";

        // ถ้าอยู่ใน LINE ให้เปิด external browser
        if(liff.isInClient()){
            liff.openWindow({
                url: window.location.href,
                external: true
            });
        }

    }catch(e){
        debug.innerText = "LIFF ERROR: " + e;
    }
}

initLiff();

// ================= CAMERA START =================
async function startCamera(){

    try{

        debug.innerText = "request camera...";

        stream = await navigator.mediaDevices.getUserMedia({
            video: {
                facingMode: { ideal: "environment" }
            },
            audio: false
        });

        video.srcObject = stream;

        // 🔥 สำคัญมาก: force load
        await video.load?.();

        await new Promise(resolve => {

            video.onloadedmetadata = () => {
                console.log("metadata ready");
                resolve();
            };

        });

        await video.play();

        // 🔥 กัน Chrome/iOS block render
        setTimeout(() => {

            console.log("video state:", video.readyState);
            console.log("size:", video.videoWidth, video.videoHeight);

        }, 500);

        debug.innerText =
            "CAMERA OK " +
            video.videoWidth + "x" + video.videoHeight;

    }catch(e){

        console.log(e);
        debug.innerText = "CAMERA ERROR: " + e;
    }
}

// ================= CAPTURE =================
async function capture(){

    if(!video.srcObject){
        debug.innerText = "No camera";
        return;
    }

    try{

        ctx.drawImage(video, 0, 0, 224, 224);

        const blob = await new Promise(res =>
            canvas.toBlob(res, "image/jpeg", 0.8)
        );

        result.innerText = "Sending...";

        const form = new FormData();
        form.append("image", blob, "frame.jpg");

        const r = await fetch(API_URL + "/predict", {
            method: "POST",
            body: form
        });

        const data = await r.json();

        console.log(data);

        if(data.status === "success"){
            result.innerHTML =
                data.label +
                "<br>" +
                Math.round(data.confidence * 100) + "%";
        }else{
            result.innerText = data.message;
        }

    }catch(e){
        console.log(e);
        result.innerText = "SEND ERROR: " + e;
    }
}

// ================= STOP CAMERA =================
function stopCamera(){

    if(stream){
        stream.getTracks().forEach(t => t.stop());
        stream = null;
        video.srcObject = null;
        result.innerText = "STOPPED";
        debug.innerText = "camera off";
    }
}

</script>

</body>
</html>
