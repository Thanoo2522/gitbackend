<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<title>LIFF Camera AI</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
html,body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    background:black;
    overflow:hidden;
    font-family:Arial;
}

#video{
    width:100vw;
    height:100vh;
    object-fit:cover;
}

#ui{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:10px;
}

button{
    padding:15px 25px;
    font-size:18px;
    border:none;
    border-radius:12px;
    background:#06c755;
    color:white;
}

#result{
    position:fixed;
    top:20px;
    left:20px;
    color:white;
    font-size:20px;
    text-shadow:0 0 5px black;
}
</style>
</head>

<body>

<!-- ================= VIDEO STREAM ================= -->
<video id="video" autoplay playsinline muted></video>

<!-- ================= RESULT ================= -->
<div id="result">Ready</div>

<!-- ================= BUTTONS ================= -->
<div id="ui">
    <button onclick="startCamera()">Start</button>
    <button onclick="takePhoto()">Capture</button>
</div>

<!-- ================= CANVAS (HIDDEN) ================= -->
<canvas id="canvas" width="224" height="224" style="display:none;"></canvas>

<script>

// ================= CONFIG =================
const LIFF_ID = "2010144029-njNgt99E";
const API_URL = "https://gitbackend-416424538655.asia-southeast3.run.app";

// ================= ELEMENTS =================
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const result = document.getElementById("result");

let stream = null;

// ================= LIFF INIT =================
async function initLiff(){

    await liff.init({ liffId: LIFF_ID });

    if (liff.isInClient()) {
        liff.openWindow({
            url: window.location.href,
            external: true
        });
        return;
    }

    console.log("LIFF ready");
}

initLiff();

// ================= 3.2 STREAM CAMERA =================
async function startCamera(){

    try{

        stream = await navigator.mediaDevices.getUserMedia({
            video:{ facingMode:"environment" },
            audio:false
        });

        video.srcObject = stream;

        await video.play();

        result.innerText = "Camera ON";

    }catch(e){
        result.innerText = "Camera ERROR: " + e;
    }
}

// ================= 3.3 CAPTURE PHOTO =================
async function takePhoto(){

    if(!video.srcObject) return;

    ctx.drawImage(video, 0, 0, 224, 224);

    // 🔥 base64 (ตามบทความ)
    const base64 = canvas.toDataURL("image/png");

    result.innerText = "Sending...";

    sendToAI(base64);
}

// ================= SEND TO BACKEND =================
async function sendToAI(base64){

    try{

        // แปลง base64 -> blob
        const res = await fetch(base64);
        const blob = await res.blob();

        const form = new FormData();
        form.append("image", blob, "frame.png");

        const r = await fetch(API_URL + "/predict", {
            method:"POST",
            body:form
        });

        const data = await r.json();

        if(data.status === "success"){
            result.innerHTML =
                data.label +
                "<br>" +
                Math.round(data.confidence * 100) + "%";
        }else{
            result.innerText = data.message;
        }

    }catch(e){
        result.innerText = "API ERROR: " + e;
    }
}

// ================= STOP CAMERA =================
function stopCamera(){

    if(stream){
        stream.getTracks().forEach(t => t.stop());
        video.srcObject = null;
        result.innerText = "Camera OFF";
    }
}

</script>

</body>
</html>
