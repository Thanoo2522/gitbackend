<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Realtime AI VDO</title>

<meta name="viewport"
content="width=device-width, initial-scale=1, maximum-scale=1">

<!-- LIFF -->
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<!-- TensorFlow -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>

<!-- Teachable Machine -->
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest"></script>

<style>

body{
    margin:0;
    background:black;
    color:white;
    font-family:Arial;
    text-align:center;
}

header{
    padding:10px;
    font-size:18px;
    font-weight:bold;
}

video{
    width:100%;
    height:auto;
    background:black;
}

button{
    width:90%;
    padding:14px;
    margin:8px;
    font-size:16px;
    border:none;
    border-radius:10px;
}

#startBtn{
    background:#00c853;
    color:white;
}

#stopBtn{
    background:#ff1744;
    color:white;
}

#result{
    margin-top:15px;
    font-size:22px;
    font-weight:bold;
    padding:10px;
}

.classBox{
    margin:8px;
    padding:10px;
    background:#222;
    border-radius:10px;
    font-size:18px;
}

canvas{
    display:none;
}

</style>
</head>

<body>

<header>
📷 LIFF Realtime AI Camera
</header>

<video
    id="video"
    autoplay
    playsinline
></video>

<button id="startBtn">
    Start Realtime AI
</button>

<button id="stopBtn">
    Stop
</button>

<div id="result">
    Loading...
</div>

<canvas id="canvas"></canvas>

<script>

// =====================================================
// GLOBAL
// =====================================================

let stream = null;

let model = null;

let running = false;

let predictLoop = null;

const video = document.getElementById("video");

const canvas = document.getElementById("canvas");

const resultDiv = document.getElementById("result");

// =====================================================
// MODEL PATH
// VSCode Folder:
//
// static/
// └── models_imagenumber/
//     ├── model.json
//     ├── metadata.json
//     └── weights.bin
// =====================================================

const MODEL_URL =
    "models_imagenumber/model.json";

const METADATA_URL =
    "models_imagenumber/metadata.json";

// =====================================================
// INIT LIFF
// =====================================================

async function initLiff(){

    try{

        // กัน init ซ้ำ
        if(window.liffLoaded){
            return;
        }

        window.liffLoaded = true;

        await liff.init({

            liffId: "{{ liff_id }}"
        });

        if(!liff.isLoggedIn()){

            liff.login();
        }

    }catch(err){

        console.log(
            "LIFF ERROR:",
            err
        );
    }
}

// =====================================================
// LOAD MODEL
// =====================================================

async function loadModel(){

    try{

        resultDiv.innerHTML =
            "Loading AI Model...";

        model = await tmImage.load(

            MODEL_URL,
            METADATA_URL
        );

        resultDiv.innerHTML =
            "Model Loaded ✅";

        console.log(
            "MODEL READY"
        );

    }catch(err){

        console.log(err);

        resultDiv.innerHTML =
            "โหลด model ไม่สำเร็จ";
    }
}

// =====================================================
// START CAMERA
// =====================================================

async function startCamera(){

    try{

        // กันเปิดซ้ำ
        if(stream){
            return;
        }

        stream =
            await navigator.mediaDevices
            .getUserMedia({

                video:{
                    facingMode:"environment"
                },

                audio:false
            });

        video.srcObject = stream;

        await video.play();

        console.log(
            "CAMERA READY"
        );

    }catch(err){

        console.log(err);

        alert(
            "เปิดกล้องไม่ได้"
        );
    }
}

// =====================================================
// PREDICT
// =====================================================

async function predictFrame(){

    try{

        if(!running){
            return;
        }

        if(!model){
            return;
        }

        // predict realtime
        const predictions =
            await model.predict(video);

        // sort มาก -> น้อย
        predictions.sort(

            (a,b)=>
                b.probability - a.probability
        );

        // show all
        let html = "";

        predictions.forEach(p => {

            html += `

                <div class="classBox">

                    ${p.className}

                    :

                    ${(p.probability*100).toFixed(1)}%

                </div>

            `;
        });

        resultDiv.innerHTML = html;

    }catch(err){

        console.log(
            "PREDICT ERROR:",
            err
        );
    }
}

// =====================================================
// START REALTIME LOOP
// 2 FPS
// =====================================================

async function startRealtimeAI(){

    try{

        // กันเปิดซ้ำ
        if(running){
            return;
        }

        running = true;

        // load model
        if(!model){

            await loadModel();
        }

        // open camera
        await startCamera();

        // realtime loop
        predictLoop = setInterval(

            async()=>{

                await predictFrame();

            },

            500 // 2 frame/sec
        );

    }catch(err){

        console.log(err);
    }
}

// =====================================================
// STOP
// =====================================================

function stopRealtimeAI(){

    running = false;

    // stop interval
    if(predictLoop){

        clearInterval(
            predictLoop
        );

        predictLoop = null;
    }

    // stop camera
    if(stream){

        stream.getTracks()
        .forEach(track=>{

            track.stop();
        });

        video.srcObject = null;

        stream = null;
    }

    resultDiv.innerHTML =
        "Stopped";
}

// =====================================================
// EVENTS
// =====================================================

document
.getElementById("startBtn")
.onclick = startRealtimeAI;

document
.getElementById("stopBtn")
.onclick = stopRealtimeAI;

// =====================================================
// AUTO START
// =====================================================

window.onload = async()=>{

    await initLiff();

    await startRealtimeAI();
};

</script>

</body>
</html>
