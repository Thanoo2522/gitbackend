<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LIFF + Teachable Machine Realtime</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- LIFF -->
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<!-- TensorFlow.js -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>

<!-- Teachable Machine Image -->
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest"></script>

<style>
body{
    margin:0;
    background:black;
    color:white;
    font-family:Arial;
    text-align:center;
}

header{
    padding:10px;
    font-size:18px;
}

video{
    width:100%;
    border-radius:10px;
}

button{
    width:90%;
    padding:12px;
    margin:6px;
    font-size:16px;
    border:none;
    border-radius:10px;
}

#startBtn{background:#00c853;color:white;}
#stopBtn{background:#ff1744;color:white;}

#label-container{
    margin-top:10px;
    font-size:18px;
    font-weight:bold;
}

canvas{display:none;}
</style>
</head>

<body>

<header>📷 Real-time AI Camera (Teachable Machine)</header>

<video id="video" autoplay playsinline></video>

<button id="startBtn">Start Camera + AI</button>
<button id="stopBtn">Stop</button>

<div id="label-container">Loading model...</div>

<script>

let stream = null;
let video = document.getElementById("video");
let model, maxPredictions;
let running = false;
let intervalId;

// 👉 path โมเดลใน VSCode
const modelURL = "models_v1/model.json";
const metadataURL = "models_v1/metadata.json";

// ===============================
// LOAD MODEL
// ===============================
async function loadModel(){
    model = await tmImage.load(modelURL, metadataURL);
    maxPredictions = model.getTotalClasses();

    document.getElementById("label-container").innerHTML = "Model Loaded ✅";
}

// ===============================
// START CAMERA
// ===============================
async function startCamera(){
    stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "environment" },
        audio: false
    });

    video.srcObject = stream;
}

// ===============================
// PREDICT FRAME
// ===============================
async function predict(){
    if(!model) return;

    const prediction = await model.predict(video);

    prediction.sort((a,b)=> b.probability - a.probability);

    let resultText = "";

    prediction.forEach(p => {
        resultText += `${p.className}: ${(p.probability*100).toFixed(1)}%<br>`;
    });

    document.getElementById("label-container").innerHTML = resultText;
}

// ===============================
// START LOOP (2 FPS)
// ===============================
function startAI(){
    if(running) return;
    running = true;

    intervalId = setInterval(() => {
        predict();
    }, 500); // 500ms = 2 frames/sec
}

// ===============================
// STOP
// ===============================
function stopAll(){
    running = false;

    if(intervalId){
        clearInterval(intervalId);
    }

    if(stream){
        stream.getTracks().forEach(t => t.stop());
    }

    video.srcObject = null;
}

// ===============================
// BUTTON EVENTS
// ===============================
document.getElementById("startBtn").onclick = async () => {
    await loadModel();
    await startCamera();
    startAI();
};

document.getElementById("stopBtn").onclick = stopAll;

// ===============================
// LIFF INIT (optional)
// ===============================
async function initLiff(){
    try{
        await liff.init({ liffId: "2010144029-njNgt99E" });

        if(!liff.isLoggedIn()){
            liff.login();
        }

    }catch(err){
        console.log("LIFF error:", err);
    }
}

initLiff();

</script>

</body>
</html>
